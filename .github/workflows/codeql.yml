name: CodeQL

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday — full database rebuild with new advisories.
    - cron: "0 3 * * 1"
  workflow_dispatch:

permissions:
  # Code queries need contents read; security events need write to file alerts.
  contents: read
  security-events: write

jobs:
  rust-analyze:
    name: CodeQL Rust
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    strategy:
      fail-fast: false
    steps:
      - uses: actions/checkout@v4
      - name: Initialize CodeQL with Rust language
        uses: github/codeql-action/init@v3
        with:
          languages: rust
          queries: security-and-quality
      - name: autobuild
        uses: github/codeql-action/autobuild@v3
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:rust"

  python-harness-analyze:
    name: CodeQL Python (harness scripts)
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Initialize CodeQL with Python language
        uses: github/codeql-action/init@v3
        with:
          languages: python
          # Don't try to model Cargo / Rust deps; we restrict to Python files.
          paths: scripts/
          queries: security-extended,security-and-quality
      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v3
        with:
          category: "/language:python"

  shellcheck-analyze:
    name: shellcheck (bash scripts)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: shellcheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: "./scripts"
          additional_files: "build-fixtures.sh,adversarial_test.sh,robustness_test.py"
          ignore_rc: false
