name: semgrep

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Weekly on Monday — catches new advisories in p/rust, p/python, p/bash.
    - cron: "0 4 * * 1"
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

jobs:
  semgrep-blocking:
    name: semgrep (errors must be 0)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python (for semgrep)
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install Semgrep
        run: |
          python -m pip install --upgrade pip
          python -m pip install semgrep
          semgrep --version
      - name: rustrip custom ruleset (must have zero errors)
        # Custom ruleset lives in .semgrep.yml and pins rustrip-specific
        # Rust/shell/Python conventions. Errors here gate CI.
        run: |
          semgrep \
            --config .semgrep.yml \
            --metrics off \
            --severity ERROR \
            --error \
            .
  semgrep-soft:
    name: semgrep (advisories, non-blocking)
    runs-on: ubuntu-latest
    needs: semgrep-blocking
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: |
          python -m pip install semgrep 2>/dev/null
      - name: Public registries — track warnings, don't gate
        run: |
          semgrep --config p/rust --config p/python --config p/bash \
            --metrics off --severity ERROR --severity WARNING --severity INFO \
            . || echo "::warning::public-registries-output"
        # Public registries churn rapidly; track but do not gate.
        continue-on-error: true
