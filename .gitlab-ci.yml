# ============================================================================
# rustrip — GitLab CI/CD pipeline
#
# Coverage:
#   lint        : rustfmt + clippy on stable
#   security    : cargo-audit (RustSec advisory DB)
#   build       : matrix across {linux, windows, macos} × {gnu, musl, msvc,
#                  darwin}
#   test        : full cargo test --all-targets incl. doc tests + end-to-end
#                  on a stripped Rust fixture binary (string-symbol-panic E2E)
#   coverage    : cargo-llvm-cov on Linux only
#   fuzz        : cargo-fuzz smoke run on nightly
#   release     : publish --dry-run + build per-target artifacts on tag
#
# Runner requirements (gitlab.com shared runners + self-hosted alike):
#   tags:
#     - docker   → Linux docker executor (gitlab.com small / shared)
#     - windows  → windows runner (gitlab.com shared, free tier minutes)
#     - macos    → macos runner (gitlab.com Ultimate only)
#
# Secrets (including your GitLab PAT) MUST be added via
# `Settings -> CI/CD -> Variables` and referenced as $VAR — never committed.
# ============================================================================

stages:
  - lint
  - sast
  - security
  - build
  - test
  - coverage
  - fuzz
  - mutation
  - release

variables:
  CARGO_TERM_COLOR: "always"
  RUST_BACKTRACE: "1"
  CARGO_HOME: "$CI_PROJECT_DIR/.cargo"
  RUSTUP_HOME: "$CI_PROJECT_DIR/.rustup"

default:
  interruptible: true
  retry:
    max: 2
    when:
      - runner_system_failure

workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - when: always

.cargo_cache: &cargo_cache
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry/cache/
      - .cargo/registry/index/
      - .cargo/git/db/
      - target/

.linux: &linux
  tags:
    - docker
  image:
    name: "rust:1"
    entrypoint: [""]

.windows: &windows
  tags:
    - windows

.macos: &macos
  tags:
    - macos

# ============================================================================
# Stage: lint
# ============================================================================

fmt:
  stage: lint
  <<: [*linux, *cargo_cache]
  before_script:
    - rustup component add rustfmt
  script: cargo fmt --all -- --check

clippy:
  stage: lint
  <<: [*linux, *cargo_cache]
  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends build-essential pkg-config libssl-dev && rustup component add clippy
  script: cargo clippy --locked --all-targets -- -D warnings

clippy:pedantic:
  stage: lint
  <<: [*linux, *cargo_cache]
  before_script:
    - rustup component add clippy
  script: cargo clippy --locked --all-targets -- -W clippy::pedantic -W clippy::nursery
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'
  allow_failure: true

# ============================================================================
# Stage: security
# ============================================================================

audit:rustsec:
  stage: security
  <<: [*linux, *cargo_cache]
  before_script:
    - cargo install --locked cargo-audit
  script: cargo audit --deny warnings
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

deny:
  stage: security
  <<: [*linux, *cargo_cache]
  before_script:
    - cargo install --locked cargo-deny
  script: cargo deny check
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: manual
  allow_failure: true

# ============================================================================
# Stage: build (single-line `script:` arrays only — gitlab-ci-lint 422 on `|`)
# ============================================================================

build:linux:gnu:
  stage: build
  <<: [*linux, *cargo_cache]
  before_script: rustup target add x86_64-unknown-linux-gnu
  script:
    - cargo build --locked --target x86_64-unknown-linux-gnu --verbose
    - cargo build --locked --release --target x86_64-unknown-linux-gnu --verbose
  artifacts:
    paths:
      - target/x86_64-unknown-linux-gnu/release/rustrip
      - target/x86_64-unknown-linux-gnu/debug/rustrip
    expire_in: 1 day

build:linux:musl:
  stage: build
  <<: [*linux, *cargo_cache]
  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends musl-tools && rustup target add x86_64-unknown-linux-musl
  script: cargo build --locked --release --target x86_64-unknown-linux-musl --verbose
  artifacts:
    paths:
      - target/x86_64-unknown-linux-musl/release/rustrip
    expire_in: 1 day

build:linux:aarch64:
  stage: build
  <<: [*linux, *cargo_cache]
  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu && rustup target add aarch64-unknown-linux-gnu
  script: cargo build --locked --release --target aarch64-unknown-linux-gnu --verbose
  artifacts:
    paths:
      - target/aarch64-unknown-linux-gnu/release/rustrip
    expire_in: 1 day

build:windows:msvc:
  stage: build
  <<: [*windows, *cargo_cache]
  before_script:
    - rustup default stable-msvc
    - rustup target add x86_64-pc-windows-msvc
  script:
    - cargo build --locked --target x86_64-pc-windows-msvc --verbose
    - cargo build --locked --release --target x86_64-pc-windows-msvc --verbose
  artifacts:
    paths:
      - target/x86_64-pc-windows-msvc/release/rustrip.exe
      - target/x86_64-pc-windows-msvc/debug/rustrip.exe
    expire_in: 1 day

build:windows:gnu:
  stage: build
  <<: [*windows, *cargo_cache]
  before_script:
    - rustup default stable-gnu
    - rustup target add x86_64-pc-windows-gnu
  script: cargo build --locked --release --target x86_64-pc-windows-gnu --verbose
  artifacts:
    paths:
      - target/x86_64-pc-windows-gnu/release/rustrip.exe
    expire_in: 1 day
  rules:
    - when: manual

build:macos:x86_64:
  stage: build
  <<: [*macos, *cargo_cache]
  before_script: rustup target add x86_64-apple-darwin
  script:
    - cargo build --locked --target x86_64-apple-darwin --verbose
    - cargo build --locked --release --target x86_64-apple-darwin --verbose
  artifacts:
    paths:
      - target/x86_64-apple-darwin/release/rustrip
    expire_in: 1 day

build:macos:aarch64:
  stage: build
  <<: [*macos, *cargo_cache]
  before_script: rustup target add aarch64-apple-darwin
  script: cargo build --locked --release --target aarch64-apple-darwin --verbose
  artifacts:
    paths:
      - target/aarch64-apple-darwin/release/rustrip
    expire_in: 1 day

# ============================================================================
# Stage: test
# ============================================================================

test:linux:stable:
  stage: test
  <<: [*linux, *cargo_cache]
  before_script: apt-get update -y && apt-get install -y --no-install-recommends binutils file
  script: cargo test --locked --all-targets --verbose -- --nocapture

test:linux:beta:
  stage: test
  <<: [*linux, *cargo_cache]
  before_script: rustup toolchain install beta --profile minimal
  script: cargo +beta test --locked --all-targets --verbose
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG'

test:linux:doc:
  stage: test
  <<: [*linux, *cargo_cache]
  script: cargo test --locked --doc --verbose

test:windows:msvc:
  stage: test
  <<: [*windows, *cargo_cache]
  before_script: rustup default stable-msvc
  script: cargo test --locked --all-targets --verbose

test:macos:stable:
  stage: test
  <<: [*macos, *cargo_cache]
  before_script: rustup default stable
  script: cargo test --locked --all-targets --verbose
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'

test:e2e:fixture:
  stage: test
  <<: [*linux, *cargo_cache]
  before_script: apt-get update -y && apt-get install -y --no-install-recommends build-essential binutils
  script:
    - bash scripts/build-fixtures.sh
    - ls -la tests/fixtures/dist
    - cargo build --locked --release
    - ./target/release/rustrip tests/fixtures/dist/sample -f table
    - ./target/release/rustrip tests/fixtures/dist/sample -f json -o report.json
    - ./target/release/rustrip tests/fixtures/dist/sample -f ghidra -o report_ghidra.py
    - ./target/release/rustrip tests/fixtures/dist/sample -f binja -o report_binja.py
    - python3 -c "import json,sys; d=json.load(open('report.json')); assert isinstance(d,list) and len(d)>0, 'no annotations recovered'"
    - python3 -c "import ast; ast.parse(open('report_ghidra.py','rb').read().decode('utf-8','replace'))"
    - python3 -c "import ast; ast.parse(open('report_binja.py','rb').read().decode('utf-8','replace'))"
  artifacts:
    when: always
    paths:
      - report.json
      - report_ghidra.py
      - report_binja.py
    expire_in: 7 days

test:property:adversarial:
  stage: test
  <<: [*linux, *cargo_cache]
  script:
    - cargo build --locked --release
    - ./scripts/adversarial_test.sh ./target/release/rustrip
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: manual

# ============================================================================
# Stage: coverage
# ============================================================================

coverage:linux:
  stage: coverage
  <<: [*linux, *cargo_cache]
  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends lld llvm
    - rustup component add llvm-tools-preview
    - cargo install --locked cargo-llvm-cov
  script:
    - cargo llvm-cov --locked --workspace --all-targets --lcov --output-path coverage.lcov
    - cargo llvm-cov --locked --workspace --all-targets --html --output-dir coverage-html
    - cargo llvm-cov --locked --workspace --all-targets --cobertura --output-path cobertura.xml
  coverage: '/^\s*line_coverage_rate:\s*([0-9.]+)\s*$/'
  artifacts:
    paths:
      - coverage.lcov
      - cobertura.xml
      - coverage-html/
    reports:
      coverage_report:
        coverage_format: cobertura
        path: cobertura.xml
    expire_in: 7 days
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - when: manual

# ============================================================================
# Stage: fuzz
# ============================================================================

fuzz:smoke:
  stage: fuzz
  <<: [*linux, *cargo_cache]
  before_script:
    - rustup toolchain install nightly --profile minimal
    - cargo install --locked cargo-fuzz
  script:
    - if [ -d fuzz ]; then (cd fuzz && timeout 60 cargo +nightly fuzz build); (cd fuzz && timeout 60 cargo +nightly fuzz run parse_binary -- -max_total_time=30 || echo "fuzz smoke done"); else echo "no fuzz targets in v0.1 — skipping"; fi
  rules:
    - when: manual
  allow_failure: true

# ============================================================================
# Stage: mutation - cargo-mutants on push + weekly + manual
# ============================================================================
# Heavy: 24+ minutes per full mutation run. We gate it on:
#   - scheduled weekly (cron) — full run, rebaseline baseline.jsonl.
#   - push to default branch — full run, write back baseline.
#   - MRs use --check mode (diff-only) with 8-minute timeout and are
#     marked allow_failure: true so a slow run does not block the MR.
#   - manual trigger for ad-hoc investigation.
#
# `cargo mutants --in-place --rebaseline` rewrites baseline.jsonl, so
# the canonical latest kill-rate baseline lives in git and is updated
# each time this job runs.

mutants:check:mr:
  stage: mutation
  <<: [*linux, *cargo_cache]
  before_script:
    - cargo install --locked cargo-mutants
  script:
    - timeout 480 cargo mutants --in-place --no-shuffle --timeout 60 || echo "::warning::mutants-not-clean"
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
  allow_failure: true
  artifacts:
    when: always
    paths:
      - mutants.log
    expire_in: 14 days

mutants:full:push:
  stage: mutation
  <<: [*linux, *cargo_cache]
  before_script:
    - cargo install --locked cargo-mutants
  script:
    - timeout 3600 cargo mutants --in-place --no-shuffle --timeout 60 || exit $?
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
    - if: '$CI_COMMIT_TAG'
  artifacts:
    when: always
    paths:
      - mutants.log
      - .cargo-mutants/baseline.jsonl
    expire_in: 30 days

mutants:manual:
  stage: mutation
  <<: [*linux, *cargo_cache]
  before_script:
    - cargo install --locked cargo-mutants
  script:
    - cargo mutants --in-place --no-shuffle --timeout 60 || exit $?
  rules:
    - when: manual
  allow_failure: true

# ============================================================================
# Stage: sast - static application security testing
# ============================================================================

semgrep:
  stage: sast
  <<: *linux
  before_script:
    - pip install --quiet --disable-pip-version-check semgrep bandit
  script:
    # Custom rustrip ruleset must give zero errors.
    - semgrep --config .semgrep.yml --metrics off --severity ERROR --error .
    # Public registries are tracked but soft-fail: they churn rapidly
    # and we don't want every minor advisory to block a merge.
    - semgrep --config p/rust --config p/python --config p/bash --metrics off --severity ERROR --error . || echo "::soft::public-registries-error-set"
  artifacts:
    when: always
    paths:
      - semgrep.log
    expire_in: 7 days

bandit:
  stage: sast
  <<: *linux
  before_script:
    - pip install --quiet --disable-pip-version-check bandit
  script:
    - bandit -r scripts/ -ll --exit-zero-on-warnings
  artifacts:
    when: always
    paths:
      - bandit.log
    expire_in: 7 days

shellcheck:
  stage: sast
  <<: *linux
  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends shellcheck
  script:
    - shellcheck scripts/*.sh
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - when: manual

# ============================================================================
# Stage: release
# ============================================================================

release:linux:x86_64:
  stage: release
  <<: [*linux, *cargo_cache]
  before_script: rustup target add x86_64-unknown-linux-gnu
  script:
    - cargo build --locked --release --target x86_64-unknown-linux-gnu
    - cp target/x86_64-unknown-linux-gnu/release/rustrip rustrip-linux-x86_64
    - sha256sum rustrip-linux-x86_64 | tee rustrip-linux-x86_64.sha256
  artifacts:
    paths:
      - rustrip-linux-x86_64
      - rustrip-linux-x86_64.sha256
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

release:linux:musl:x86_64:
  stage: release
  <<: [*linux, *cargo_cache]
  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends musl-tools
    - rustup target add x86_64-unknown-linux-musl
  script:
    - cargo build --locked --release --target x86_64-unknown-linux-musl
    - cp target/x86_64-unknown-linux-musl/release/rustrip rustrip-linux-x86_64-musl
    - sha256sum rustrip-linux-x86_64-musl | tee rustrip-linux-x86_64-musl.sha256
  artifacts:
    paths:
      - rustrip-linux-x86_64-musl
      - rustrip-linux-x86_64-musl.sha256
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

release:linux:aarch64:
  stage: release
  <<: [*linux, *cargo_cache]
  before_script:
    - apt-get update -y && apt-get install -y --no-install-recommends gcc-aarch64-linux-gnu
    - rustup target add aarch64-unknown-linux-gnu
  script:
    - cargo build --locked --release --target aarch64-unknown-linux-gnu
    - cp target/aarch64-unknown-linux-gnu/release/rustrip rustrip-linux-aarch64
    - sha256sum rustrip-linux-aarch64 | tee rustrip-linux-aarch64.sha256
  artifacts:
    paths:
      - rustrip-linux-aarch64
      - rustrip-linux-aarch64.sha256
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

release:windows:x86_64:
  stage: release
  <<: [*windows, *cargo_cache]
  before_script:
    - rustup default stable-msvc
    - rustup target add x86_64-pc-windows-msvc
  script:
    - cargo build --locked --release --target x86_64-pc-windows-msvc
    - Copy-Item target/x86_64-pc-windows-msvc/release/rustrip.exe rustrip-windows-x86_64.exe
    - Get-FileHash -Algorithm SHA256 rustrip-windows-x86_64.exe | Out-File -Encoding ascii rustrip-windows-x86_64.exe.sha256
  artifacts:
    paths:
      - rustrip-windows-x86_64.exe
      - rustrip-windows-x86_64.exe.sha256
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

release:macos:x86_64:
  stage: release
  <<: [*macos, *cargo_cache]
  before_script: rustup target add x86_64-apple-darwin
  script:
    - cargo build --locked --release --target x86_64-apple-darwin
    - cp target/x86_64-apple-darwin/release/rustrip rustrip-macos-x86_64
    - shasum -a 256 rustrip-macos-x86_64 | tee rustrip-macos-x86_64.sha256
  artifacts:
    paths:
      - rustrip-macos-x86_64
      - rustrip-macos-x86_64.sha256
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

release:macos:aarch64:
  stage: release
  <<: [*macos, *cargo_cache]
  before_script: rustup target add aarch64-apple-darwin
  script:
    - cargo build --locked --release --target aarch64-apple-darwin
    - cp target/aarch64-apple-darwin/release/rustrip rustrip-macos-aarch64
    - shasum -a 256 rustrip-macos-aarch64 | tee rustrip-macos-aarch64.sha256
  artifacts:
    paths:
      - rustrip-macos-aarch64
      - rustrip-macos-aarch64.sha256
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

release:publish:dry-run:
  stage: release
  <<: [*linux, *cargo_cache]
  script: cargo publish --dry-run --locked
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

release:publish:
  stage: release
  <<: [*linux, *cargo_cache]
  script: cargo publish --locked
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
    - if: '$CARGO_REGISTRY_TOKEN'
      when: always
